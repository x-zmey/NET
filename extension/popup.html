<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      color: white;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    .subtitle {
      font-size: 10px;
      color: #888;
    }
    label {
      display: block;
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus {
      border-color: #3b82f6;
    }
    input::placeholder {
      color: #555;
    }
    button {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 8px;
      color: #22c55e;
      min-height: 18px;
    }
    .help {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #222;
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">EN</div>
    <div>
      <div class="title">Native English Translator</div>
      <div class="subtitle">Upwork Message Helper</div>
    </div>
  </div>

  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="https://your-domain.com/api/translate">

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="net_xxxxxxxxxxxxxxxx">

  <button id="save">Save Settings</button>
  <div class="status" id="status"></div>

  <div class="help">
    <strong>How to use:</strong> Type a message in Upwork chat, select the text, then click the <strong>EN</strong> button that appears.
  </div>

  <script src="popup.js"></script>
</body>
</html>
