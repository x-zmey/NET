name: Build Desktop App

on:
  push:
    paths:
      - 'desktop/**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        working-directory: desktop
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o dist/net-linux-amd64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: net-linux-amd64
          path: desktop/dist/net-linux-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        working-directory: desktop
        run: go build -ldflags="-s -w -H windowsgui" -o dist/net-windows-amd64.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: net-windows-amd64
          path: desktop/dist/net-windows-amd64.exe
